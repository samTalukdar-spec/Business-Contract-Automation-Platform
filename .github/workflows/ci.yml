name: LexStellar CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────── Smart Contract Tests ────────
  contract-tests:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Contract Tests
        run: cargo test --workspace

      - name: Build WASM Artifacts
        run: cargo build --target wasm32-unknown-unknown --release

  # ──────── Frontend Lint & Type Check ────────
  frontend-lint:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  # ──────── Frontend Tests ────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm test

  # ──────── Deploy (main branch only) ────────
  deploy:
    name: Deploy Frontend
    needs: [contract-tests, frontend-lint, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Validate Build
        run: |
          echo '✅ Build completed successfully'
          ls -la .next/

      # Add your deployment target here:
      # - Vercel: Use vercel-action
      # - Netlify: Use netlify-cli
      # - AWS: Use aws-cli
      - name: Deploy Placeholder
        run: echo '🚀 Deploy step - configure your deployment target'
